
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kids Alphabet Learning</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
background:linear-gradient(to bottom,#dff6ff,#ffffff);
}

h1{
color:#ff6600;
font-size:40px;
padding:20px;
}

.card{
background:white;
max-width:400px;
margin:20px auto;
padding:20px;
border-radius:25px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.letter{
font-size:100px;
font-weight:bold;
color:#0066ff;
}

.image{
font-size:120px;
margin:10px;
}

.word{
font-size:40px;
font-weight:bold;
}

button{
padding:15px 25px;
font-size:20px;
margin:10px;
border:none;
border-radius:15px;
cursor:pointer;
}

.speak{
background:#4CAF50;
color:white;
}

.next{
background:#ff9800;
color:white;
}
</style>
</head>

<body>

<h1>🌟 Kids Alphabet Learning 🌟</h1>

<div class="card">

<div class="letter" id="letter">A</div>

<div class="image" id="image">🍎</div>

<div class="word" id="word">Apple</div>

<button class="speak" onclick="speak()">🔊 Speak</button>

<button class="next" onclick="nextLetter()">➡ Next</button>

</div>

<script>

const alphabet=[
["A","🍎","Apple"],
["B","⚽","Ball"],
["C","🐱","Cat"],
["D","🐶","Dog"],
["E","🐘","Elephant"],
["F","🐟","Fish"],
["G","🦒","Giraffe"],
["H","🏠","House"],
["I","🍦","Ice Cream"],
["J","🤹","Joker"],
["K","🪁","Kite"],
["L","🦁","Lion"],
["M","🌙","Moon"],
["N","🪺","Nest"],
["O","🦉","Owl"],
["P","🐼","Panda"],
["Q","👑","Queen"],
["R","🌈","Rainbow"],
["S","☀️","Sun"],
["T","🐯","Tiger"],
["U","☂️","Umbrella"],
["V","🚐","Van"],
["W","🍉","Watermelon"],
["X","🎵","Xylophone"],
["Y","🛥️","Yacht"],
["Z","🦓","Zebra"]
];

let index=0;

function nextLetter(){
index=(index+1)%alphabet.length;

document.getElementById("letter").innerHTML=alphabet[index][0];
document.getElementById("image").innerHTML=alphabet[index][1];
document.getElementById("word").innerHTML=alphabet[index][2];
}

function speak(){

let text=
alphabet[index][0] +
" for " +
alphabet[index][2];

speechSynthesis.speak(
new SpeechSynthesisUtterance(text)
);

}

</script>

</body>
</html>
